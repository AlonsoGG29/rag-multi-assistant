<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#2563eb">
    <meta name="description" content="RAG Multi-Assistant - Chat con IA potenciado por RAG">
    <title>RAG Multi-Assistant</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Estilos globales -->
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body, #root {
            width: 100%;
            height: 100%;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background-color: #f3f4f6;
            color: #1f2937;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        /* Scrollbar personalizado */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }

        ::-webkit-scrollbar-track {
            background: #f1f5f9;
        }

        ::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #94a3b8;
        }
    </style>
</head>
<body>
    <div id="root"></div>
</body>
</html>

</head>
<body>

    <script>
        const API_BASE = "http://localhost:8000";
        let assistants = [];
        let selectedAssistantId = null;
        let messages = [];
        let attachedFile = null;

        // Cargar asistentes al inicio
        async function loadAssistants() {
            try {
                const response = await fetch(`${API_BASE}/assistants`);
                if (!response.ok) throw new Error("Error al cargar asistentes");
                
                assistants = await response.json();
                displayAssistants();
                
                if (assistants.length === 0) {
                    document.getElementById('chatMessages').innerHTML = '<p class="loading">No hay asistentes. Crea uno nuevo.</p>';
                }
            } catch (error) {
                console.error(error);
                document.getElementById('chatMessages').innerHTML = `<p class="error">Error al conectar con el servidor: ${error.message}</p>`;
            }
        }

        // Mostrar lista de asistentes
        function displayAssistants() {
            const list = document.getElementById('assistantsList');
            list.innerHTML = '';

            assistants.forEach(assistant => {
                const li = document.createElement('li');
                li.className = 'assistant-item';
                
                const nameSpan = document.createElement('span');
                nameSpan.className = 'assistant-name';
                nameSpan.textContent = assistant.name;
                nameSpan.onclick = () => selectAssistant(assistant.id, assistant.name);
                
                const actions = document.createElement('div');
                actions.className = 'assistant-actions';
                
                const editBtn = document.createElement('button');
                editBtn.className = 'btn-action btn-edit';
                editBtn.textContent = '✏️ Editar';
                editBtn.onclick = (e) => {
                    e.stopPropagation();
                    editAssistant(assistant.id, assistant.name, assistant.instructions);
                };
                
                const deleteBtn = document.createElement('button');
                deleteBtn.className = 'btn-action';
                deleteBtn.textContent = '🗑️ Eliminar';
                deleteBtn.onclick = (e) => {
                    e.stopPropagation();
                    deleteAssistant(assistant.id, assistant.name);
                };
                
                actions.appendChild(editBtn);
                actions.appendChild(deleteBtn);
                
                li.appendChild(nameSpan);
                li.appendChild(actions);
                list.appendChild(li);
            });
        }

        // Seleccionar un asistente
        function selectAssistant(id, name) {
            selectedAssistantId = id;
            messages = [];
            attachedFile = null;

            // Actualizar UI
            document.querySelectorAll('.assistant-item').forEach(item => {
                item.classList.remove('active');
            });
            event.target.classList.add('active');

            document.getElementById('chatTitle').textContent = `Chat con ${name}`;
            document.getElementById('chatMessages').innerHTML = '<p class="loading">Conversación iniciada. Haz una pregunta...</p>';
            document.getElementById('messageInput').disabled = false;
            document.getElementById('sendBtn').disabled = false;
            document.getElementById('attachBtn').disabled = false;
            document.getElementById('fileStatus').style.display = 'none';
            document.getElementById('messageInput').focus();
        }

        // Manejar selección de archivo
        document.addEventListener('DOMContentLoaded', () => {
            const fileInput = document.getElementById('fileInput');
            const attachBtn = document.getElementById('attachBtn');
            const fileStatus = document.getElementById('fileStatus');

            fileInput.addEventListener('change', async (e) => {
                if (e.target.files.length > 0) {
                    attachedFile = e.target.files[0];
                    
                    // Cargar el PDF al servidor (indexar)
                    if (!selectedAssistantId) {
                        alert('Selecciona un asistente primero');
                        fileInput.value = '';
                        return;
                    }
                    
                    console.log(`📤 Uploadando PDF: ${attachedFile.name}`);
                    fileStatus.textContent = '⏳ Cargando y procesando PDF...';
                    fileStatus.style.display = 'block';
                    
                    const formData = new FormData();
                    formData.append('file', attachedFile);
                    
                    try {
                        const response = await fetch(
                            `${API_BASE}/assistants/${selectedAssistantId}/documents`,
                            {
                                method: 'POST',
                                body: formData
                            }
                        );
                        
                        const result = await response.json();
                        
                        if (result.success) {
                            fileStatus.textContent = `✅ ${result.filename}: ${result.chunks_indexed} chunks indexados`;
                            attachBtn.classList.add('file-attached');
                            attachBtn.textContent = '✓ PDF Indexado';
                            attachedFile = null;
                            fileInput.value = '';
                        } else {
                            fileStatus.textContent = `❌ Error: ${result.error}`;
                            fileStatus.style.color = 'red';
                        }
                    } catch (error) {
                        fileStatus.textContent = `❌ Error: ${error.message}`;
                        fileStatus.style.color = 'red';
                        console.error(error);
                    }
                } else {
                    attachedFile = null;
                    fileStatus.style.display = 'none';
                    attachBtn.classList.remove('file-attached');
                    attachBtn.textContent = '📎 Adjuntar PDF';
                }
            });

            document.getElementById('messageInput').addEventListener('keypress', (e) => {
                if (e.key === 'Enter' && !document.getElementById('sendBtn').disabled) {
                    sendMessage();
                }
            });

            loadAssistants();
        });

        // Enviar mensaje (sin archivo - ya indexado)
        async function sendMessage() {
            const input = document.getElementById('messageInput');
            const message = input.value.trim();

            if (!message || !selectedAssistantId) return;

            // Agregar mensaje del usuario
            messages.push({ role: 'user', content: message });
            displayMessages();

            input.value = '';
            document.getElementById('sendBtn').disabled = true;
            document.getElementById('attachBtn').disabled = true;

            try {
                // Enviar a /chat (el PDF ya fue indexado en la BD)
                const response = await fetch(`${API_BASE}/chat`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        assistant_id: selectedAssistantId,
                        message: message,
                        session_id: selectedAssistantId + "_session" // Session consistente por asistente
                    })
                });

                if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);

                const data = await response.json();
                messages.push({ role: 'assistant', content: data.response });
                displayMessages();
            } catch (error) {
                console.error(error);
                messages.push({ role: 'assistant', content: `Error: ${error.message}` });
                displayMessages();
            } finally {
                document.getElementById('sendBtn').disabled = false;
                document.getElementById('attachBtn').disabled = false;
                document.getElementById('messageInput').focus();
            }
        }

        // Mostrar mensajes en el chat
        function displayMessages() {
            const chatDiv = document.getElementById('chatMessages');
            chatDiv.innerHTML = '';

            messages.forEach(msg => {
                const div = document.createElement('div');
                div.className = `message ${msg.role}`;

                const content = document.createElement('div');
                content.className = 'message-content';
                content.textContent = msg.content;

                div.appendChild(content);
                chatDiv.appendChild(div);
            });

            // Scroll al final
            chatDiv.scrollTop = chatDiv.scrollHeight;
        }

        // Crear nuevo asistente (básico)
        function showNewAssistantForm() {
            const name = prompt('Nombre del asistente:');
            if (!name) return;

            const instructions = prompt('Instrucciones del asistente:');
            if (!instructions) return;

            createAssistant(name, instructions);
        }

        async function createAssistant(name, instructions) {
            try {
                const response = await fetch(`${API_BASE}/assistants`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        name: name,
                        instructions: instructions,
                        description: ''
                    })
                });

                if (!response.ok) throw new Error("Error al crear asistente");

                alert('Asistente creado exitosamente');
                loadAssistants();
            } catch (error) {
                alert(`Error: ${error.message}`);
            }
        }

        // Editar asistente
        function editAssistant(id, currentName, currentInstructions) {
            const name = prompt('Nombre del asistente:', currentName);
            if (!name) return;

            const instructions = prompt('Instrucciones del asistente:', currentInstructions);
            if (!instructions) return;

            updateAssistant(id, name, instructions);
        }

        async function updateAssistant(id, name, instructions) {
            try {
                const response = await fetch(`${API_BASE}/assistants/${id}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        name: name,
                        instructions: instructions,
                        description: ''
                    })
                });

                if (!response.ok) throw new Error("Error al actualizar asistente");

                alert('Asistente actualizado exitosamente');
                loadAssistants();
            } catch (error) {
                alert(`Error: ${error.message}`);
            }
        }

        // Eliminar asistente
        function deleteAssistant(id, name) {
            const confirm = prompt(`¿Estás seguro de que deseas eliminar el asistente "${name}"? (Escribe "SI" para confirmar)`);
            if (confirm !== 'SI') return;

            removeAssistant(id);
        }

        async function removeAssistant(id) {
            try {
                const response = await fetch(`${API_BASE}/assistants/${id}`, {
                    method: 'DELETE',
                    headers: { 'Content-Type': 'application/json' }
                });

                if (!response.ok) throw new Error("Error al eliminar asistente");

                alert('Asistente eliminado exitosamente');
                
                // Si el asistente eliminado estaba seleccionado, limpiar la conversación
                if (selectedAssistantId === id) {
                    selectedAssistantId = null;
                    messages = [];
                    attachedFile = null;
                    document.getElementById('chatTitle').textContent = 'Selecciona un asistente';
                    document.getElementById('chatMessages').innerHTML = '<p class="loading">Cargando asistentes...</p>';
                    document.getElementById('messageInput').disabled = true;
                    document.getElementById('sendBtn').disabled = true;
                    document.getElementById('attachBtn').disabled = true;
                }
                
                loadAssistants();
            } catch (error) {
                alert(`Error: ${error.message}`);
            }
        }

        // Permitir enviar con Enter
        document.addEventListener('DOMContentLoaded', () => {
            document.getElementById('messageInput').addEventListener('keypress', (e) => {
                if (e.key === 'Enter' && !document.getElementById('sendBtn').disabled) {
                    sendMessage();
                }
            });

            loadAssistants();
        });
    </script>
</body>
</html>
